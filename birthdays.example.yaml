# 생일 설정 예시 파일.
# 이 파일을 birthdays.yaml 로 복사한 뒤 본인 생일로 수정하세요.
#   cp birthdays.example.yaml birthdays.yaml
# birthdays.yaml 은 .gitignore 되어 push 되지 않습니다(개인정보).
# birthdays.yaml 이 없으면 generate.py 는 이 예시 파일로 빌드합니다.

settings:
  years_ahead: 50                              # 오늘부터 몇 년치 생성
  all_day: true                                # true=종일 일정
  reminder_days: 1                             # 며칠 전 알림 (0=당일)
  title_format: "🎂 {name} 생일 ({age}세)"    # {name}=이름, {age}=해당연도-출생연도

people:
  # type: lunar(음력) 또는 solar(양력)
  # date: 출생일 YYYY-MM-DD (음력이면 음력 날짜 그대로)
  # leap_month: 음력 윤달이면 true (양력은 생략 가능)
  - name: 홍길동
    type: solar
    date: 1990-01-01

  - name: 홍길순
    type: lunar
    date: 1992-08-15
    leap_month: false
